name: Cardmarket Preise scrapen

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      language:
        description: 'Sprache (D, GB, F, I, E)'
        required: false
        default: 'D'
      condition:
        description: 'Zustand (NM, EX, GD, LP)'
        required: false
        default: 'NM'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Playwright Browser installieren
        run: npx playwright install chromium --with-deps

      - name: Preise scrapen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRAPE_LANG: ${{ github.event.inputs.language || 'D' }}
          SCRAPE_COND: ${{ github.event.inputs.condition || 'NM' }}
        run: node scripts/scraper.js
